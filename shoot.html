<html>
  <head>
    <title>8 Ball</title>
    <link rel="stylesheet" href="shoot.css" />
  </head>

  <body>
    <main>
      <div class="card">
        <div class="logo"><h1>8 Ball</h1></div>
        <form action="display.html" method="post">
          <div class="card-section">
            <p class="card-section-label">New Game</p>
            <div class="field">
              <label for="player1">Player 1:</label>
              <input type="text" id="player1" name="player1" />
            </div>

            <div class="field">
              <label for="player2">Player 2:</label>
              <input type="text" id="player2" name="player2" />
            </div>

            <div class="field">
              <label for="gameName">Game Name:</label>
              <input
                type="text"
                id="gameName"
                name="gameName"
                placeholder="e.g. Friday Night Match"
              />
            </div>
          </div>

          <div class="divider">or</div>

          <div class="card-section">
            <p class="card-section-label">Load Game</p>
            <div class="field">
              <label for="gameId">Game ID:</label>
              <input
                type="text"
                id="gameId"
                name="gameId"
                placeholder="Enter your game id..."
              />
            </div>
          </div>

          <button class="btn" type="submit">Play</button>
        </form>
      </div>
    </main>
    <script>
      document.querySelector("form").addEventListener("submit", function (e) {
        const player1 = document.getElementById("player1").value.trim();
        const player2 = document.getElementById("player2").value.trim();
        const gameName = document.getElementById("gameName").value.trim();
        const gameId = document.getElementById("gameId").value.trim();

        const newGame = player1 && player2 && gameName;
        const loadGame = gameId;

        if (!newGame && !loadGame) {
          e.preventDefault();
          alert(
            "Please fill in Player 1, Player 2 and Game Name or enter a Game ID to load an existing game.",
          );
        }
      });
    </script>
  </body>
</html>
